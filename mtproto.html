<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MTProto Proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#212020;
  --card-bg:rgba(58,58,58,0.4);
  --card-border:rgba(255,255,255,0.07);
  --card-hover-border:rgba(255,255,255,0.14);
  --text-primary:#f0f1f5;
  --text-muted:#6b7280;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --radius:20px;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text-primary);
  overflow-x:hidden;
}

/* subtle bg glow */
body::before{
  content:'';
  position:fixed;
  top:-20%;left:-10%;
  width:60%;height:60%;
  background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;
  bottom:-10%;right:-10%;
  width:50%;height:50%;
  background:radial-gradient(circle,rgba(96,165,250,0.06) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  max-width:1400px;
  margin:0 auto;
  padding:40px 20px 140px;
  width:100%;
}

/* Header */
.header{
  margin-bottom:36px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 4px 14px rgba(59,130,246,0.3);
}

.header h1{
  font-family:'Unbounded',sans-serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.5px;
  color:#fff;
}

.header p{
  font-size:13px;
  color:var(--text-muted);
  padding-left:46px;
}

/* Filters row */
.filters{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:50px;
  padding:7px 14px;
  font-size:13px;
  color:var(--text-muted);
  cursor:default;
  user-select:none;
}

.filter-pill.active{
  border-color:rgba(59,130,246,0.4);
  color:var(--accent2);
  background:rgba(59,130,246,0.08);
}

.filter-pill svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.count-badge{
  background:rgba(59,130,246,0.18);
  color:var(--accent2);
  font-size:11px;font-weight:600;
  padding:2px 7px;
  border-radius:20px;
}

/* Grid */
.proxy-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:12px;
  min-height:0;
  width:100%;
}

/* Card */
.proxy-card{
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  padding:18px 14px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  cursor:default;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
}

.proxy-card:hover{
  border-color:var(--card-hover-border);
  transform:translateY(-3px);
  box-shadow:0 16px 32px rgba(0,0,0,0.35);
}

/* Flag circle */
.flag-wrap{
  width:60px;height:60px;
  border-radius:16px;
  background:#1e2130;
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
  overflow:hidden;
  flex-shrink:0;
}

.flag-wrap img{
  width:48px;height:48px;
  object-fit:cover;
  border-radius:50%;
}

/* Status dot */
.status-dot{
  position:absolute;
  top:14px;right:14px;
  width:8px;height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 6px rgba(34,197,94,0.6);
}

/* Country label */
.country{
  font-family:'Unbounded',sans-serif;
  font-size:11px;
  font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:4px;
}

/* Address */
.address{
  font-size:12px;
  color:var(--text-primary);
  font-weight:600;
  width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:14px;
}

/* Port badge */
.port-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(59,130,246,0.1);
  border:1px solid rgba(59,130,246,0.2);
  border-radius:8px;
  padding:3px 8px;
  font-size:11px;
  color:var(--accent2);
  font-weight:500;
  margin-bottom:14px;
}

/* Action buttons */
.actions{
  display:flex;
  flex-direction:column;
  gap:7px;
  width:100%;
  margin-top:auto;
}

/* Liquid fill button */
.btn{
  position:relative;
  width:100%;
  border:1px solid rgba(255,255,255,0.1);
  outline:none;
  background:rgba(58,58,58,0.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#c0c0c0;
  padding:10px 0;
  font-size:12px;
  font-weight:600;
  font-family:'DM Sans',sans-serif;
  border-radius:12px;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;justify-content:center;
  gap:5px;
  overflow:hidden;
  -webkit-mask-image:-webkit-radial-gradient(white,black);
  transform:translateZ(0);
  transition:color .4s ease,border-color .4s ease,box-shadow .4s ease;
  letter-spacing:0.2px;
}

.btn svg{
  width:13px;height:13px;
  stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  flex-shrink:0;
  position:relative;z-index:1;
}

.btn span{position:relative;z-index:1;}

.btn::before{
  content:'';
  position:absolute;
  top:100%;left:-2%;
  width:104%;height:180%;
  background:linear-gradient(0deg,#1d4ed8 0%,#3b82f6 50%,#60a5fa 100%);
  border-radius:46% 46% 0 0;
  transition:transform 1.5s cubic-bezier(0.19,1,0.22,1);
  z-index:0;
}

.btn:hover{
  color:#fff;
  border-color:#3b82f6;
  box-shadow:0 0 14px rgba(59,130,246,0.35);
}

.btn:hover::before{
  transform:translateY(-100%) rotate(2deg);
}

.btn-connect{
  border-color:rgba(59,130,246,0.25);
  color:#60a5fa;
}

.btn-copy.copied{
  color:#fff;
  border-color:#22c55e;
  box-shadow:0 0 12px rgba(34,197,94,0.35);
}

.btn-copy.copied::before{
  background:#16a34a;
  transform:translateY(-100%);
}

/* Bottom nav */
.bottom-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  width:calc(100% - 32px);
  max-width:340px;
  background:rgba(33,32,32,0.75);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:5px;
  display:flex;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.nav-indicator{
  position:absolute;
  top:5px;bottom:5px;left:5px;
  background:rgba(59,130,246,0.14);
  border:1px solid rgba(59,130,246,0.3);
  border-radius:17px;
  transition:left .4s cubic-bezier(.25,1,.5,1),width .4s cubic-bezier(.25,1,.5,1);
  z-index:0;
  pointer-events:none;
}

.bar-btn{
  flex:1;
  background:transparent;
  border:none;outline:none;
  padding:11px 0;
  font-size:12px;font-weight:500;
  font-family:'DM Sans',sans-serif;
  color:#6b7280;
  border-radius:17px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .25s;
  text-decoration:none;
  z-index:1;
}

.bar-btn:hover{color:#cbd5e1;}
.bar-btn.active{color:#60a5fa;font-weight:600;}

/* Mobile */
@media(max-width:500px){
  .page{padding:24px 12px 100px;}
  .header h1{font-size:18px;}
  .proxy-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .proxy-card{padding:14px 10px 12px;}
  .flag-wrap{width:50px;height:50px;border-radius:13px;}
  .flag-wrap img{width:40px;height:40px;}
  .address{font-size:11px;}
  .btn{font-size:11px;padding:9px 0;}
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
        <div class="header-top">
      <h1>MTProto</h1>
    </div>
    <p1>Надёжные прокси для Telegram</p1>
  </div>

  <div class="filters">
    <div class="filter-pill active">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Все серверы
      <span class="count-badge">6</span>
    </div>
    <div class="filter-pill">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10A15.3 15.3 0 0 1 8 12a15.3 15.3 0 0 1 4-10z"/></svg>
      США
    </div>
    <div class="filter-pill">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Онлайн
    </div>
  </div>

  <div class="proxy-grid" id="proxyList"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="nav-indicator" id="navIndicator"></div>
  <button class="bar-btn" onclick="navigateTo('https://secret-xyz.github.io/site/index.html',this)">Главное меню</button>
  <button class="bar-btn active" id="activeBtn">MTProto</button>
</div>

<script>
const proxies = [

  {server:'love.funstat.info', port:853, secret:'ee26ca1d1b79910d1d2b9a55fb2479f5e6646e732e676f6f676c65', country:'Финляндия', flag:'https://smsbest.io/wp-content/uploads/2023/05/fi.svg'},
  {server:'aweary.callisection.perspire.playtime.sahib.popochek.com', port:28518, secret:'805832012eb834b6ca3115b4d4f02993', country:'Финляндия', flag:'https://smsbest.io/wp-content/uploads/2023/05/fi.svg'},
  {server:'llazyrin.duckdns.org', port:8443, secret:'eeb359972f13e568d2e15bc826257028d5676f6f676c652e636f6d', country:'Финляндия', flag:'https://smsbest.io/wp-content/uploads/2023/05/fi.svg'},

];

function tgLink(p){return `tg://proxy?server=${p.server}&port=${p.port}&secret=${p.secret}`;}

const list = document.getElementById('proxyList');
proxies.forEach(p => {
  const card = document.createElement('div');
  card.className = 'proxy-card';
  card.innerHTML = `
    <div class="status-dot"></div>
    <div class="flag-wrap">
      <img src="${p.flag}" alt="${p.country}" onerror="this.style.display='none'">
    </div>
    <div class="country">${p.country}</div>
    <div class="address" title="${p.server}">${p.server}</div>
    <div class="port-badge">
      <svg viewBox="0 0 24 24" width="11" height="11" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      :${p.port}
    </div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyProxy('${tgLink(p)}',this)">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>Копировать</span>
      </button>
      <a href="${tgLink(p)}" class="btn btn-connect">
        <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
        <span>Открыть</span>
      </a>
    </div>
  `;
  list.appendChild(card);
});

function copyProxy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const sp = btn.querySelector('span');
    const orig = sp.innerText;
    sp.innerText = 'Скопировано';
    btn.classList.add('copied');
    setTimeout(() => { sp.innerText = orig; btn.classList.remove('copied'); }, 1300);
  }).catch(err => console.error(err));
}

function updateIndicator(el) {
  const ind = document.getElementById('navIndicator');
  if(el && ind){ ind.style.width = el.offsetWidth+'px'; ind.style.left = el.offsetLeft+'px'; }
}

window.addEventListener('DOMContentLoaded', () => updateIndicator(document.querySelector('.bar-btn.active')));
window.addEventListener('resize', () => updateIndicator(document.querySelector('.bar-btn.active')));

function navigateTo(url, btn) {
  document.querySelectorAll('.bar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateIndicator(btn);
  setTimeout(() => { window.location.href = url; }, 350);
}
</script>
</body>
