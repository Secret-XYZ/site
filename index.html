        /* Анимированный фон: Синее северное сияние */
        body {
            background: radial-gradient(circle at 20% 30%, #0d2b45 0%, #07111e 50%, #020509 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* Эффект переливающегося сияния */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 82, 212, 0.4) 0%, rgba(67, 198, 172, 0.1) 60%, transparent 100%);
            filter: blur(80px);
            z-index: 0;
            animation: aurora 12s infinite alternate ease-in-out;
        }
        body::after {
            background: radial-gradient(circle, rgba(9, 132, 227, 0.3) 0%, rgba(0, 242, 254, 0.05) 60%, transparent 100%);
            animation: aurora 18s infinite alternate-reverse ease-in-out;
            right: 10%;
            top: 10%;
        }

        @keyframes aurora {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 50px) scale(1.2); }
            100% { transform: translate(-40px, 90px) scale(0.9); }
        }

        /* Главный контейнер — Жидкое стекло */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);

            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),

        }

        header {

            margin-bottom: 30px;
        }

            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            font-size: 13px;
            color: #708090;
            margin-top: 5px;
        }

        /* Список прокси карточек */
        .proxy-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка прокси */
        .proxy-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .proxy-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.1);
        }

        .proxy-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .flag {
            font-size: 28px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .details h3 {
            font-size: 16px;
            color: #f8fafc;
            font-weight: 600;
        }

        .details p {
            font-size: 12px;
            color: #94a3b8;
            font-family: monospace;
            margin-top: 3px;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Сет кнопок */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            outline: none;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Кнопка Подключить */
        .btn-connect {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }

<script>
    // Скрипт копирования в буфер
    function copyProxy(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = button.innerText;
            button.innerText = 'Скопировано!';
            button.classList.add('copied');

            setTimeout(() => {
                button.innerText = originalText;
                button.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            console.error('Не удалось скопировать: ', err);
        });
    }
