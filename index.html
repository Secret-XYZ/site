<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            background: #02040a;
            font-family: 'Inter', sans-serif;
        }

        body {
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 60px 16px 140px 16px;
            position: relative;
            min-height: 100vh;
        }

        /* Синий статичный градиентный рефлекс на фоне */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 50% 30%, rgba(0, 102, 255, 0.15) 0%, transparent 60%);
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
        }

        /* Главный контейнер стартовой */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 14px;
            color: #8c9ba5;
            margin-top: 8px;
        }

        /* Сетка для блоков */
        .hub-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        /* Элитный кликабельный блок (стиль Маркета) */
        .hub-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Эффект Liquid Fill затекания при наведении на весь блок */
        .hub-block::before {
            content: '';
            position: absolute;
            top: 100%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: linear-gradient(0deg, rgba(0, 82, 212, 0.2) 0%, rgba(67, 100, 247, 0.1) 100%);
            border-radius: 40% 40% 0 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .hub-block:hover {
            border-color: rgba(0, 149, 255, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 149, 255, 0.15);
        }

        .hub-block:hover::before {
            transform: translateY(-105%);
        }

        /* Внутренности блока */
        .block-content {
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
        }

        .block-icon {
            font-size: 28px;
            background: rgba(0, 149, 255, 0.1);
            border: 1px solid rgba(0, 149, 255, 0.15);
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            color: #0095ff;
            flex-shrink: 0;
        }

        .block-text h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
        }

        .block-text p {
            font-size: 13px;
            color: #8c9ba5;
            margin-top: 4px;
        }

        /* Стрелочка перехода справа */
        .block-arrow {
            font-size: 18px;
            color: #4b5563;
            transition: transform 0.3s ease, color 0.3s ease;
            padding-right: 4px;
        }

        .hub-block:hover .block-arrow {
            color: #0095ff;
            transform: translateX(4px);
        }

        /* Нижнее меню (Маркет стиль) */
        .bottom-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 32px);
            max-width: 360px;
            background: rgba(10, 16, 32, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 6px;
            display: flex;
            gap: 4px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        }

        .bar-btn {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 500;
            color: #8e9aa8;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .bar-btn:hover {
            color: #ffffff;
        }

        .bar-btn.active {
            color: #0095ff;
            background: rgba(0, 149, 255, 0.08);
            border: 1px solid rgba(0, 149, 255, 0.15);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 30px; }
            .hub-block { padding: 20px; border-radius: 20px; }
            .block-icon { width: 48px; height: 48px; font-size: 24px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>Proxy</h1>
        <p>Выберите интересующий протокол</p>
    </header>

    <div class="hub-grid">
        <a href="https://secret-xyz.github.io/site/mtproto.html" class="hub-block">
            <div class="block-content">
                <div class="block-icon">🛡️</div>
                <div class="block-text">
                    <h2>MTProto</h2>
                    <p>Высокоскоростные узлы для Telegram</p>
                </div>
            </div>
            <div class="block-arrow">➔</div>
        </a>
    </div>
</div>

<div class="bottom-bar">
    <button class="bar-btn active">
        <span>Главное меню</span>
    </button>
    <button class="bar-btn" onclick="location.href='https://secret-xyz.github.io/site/mtproto.html'">
        <span>MTProto</span>
    </button>
</div>

</body>
</html>
