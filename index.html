<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хакерский Кодер от Куки 🐾</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #cfcfcf;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4caf50;
        }
        textarea {
            width: 100%;
            height: 100px;
            background: #111;
            color: #00ff00;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            resize: none;
        }
        .buttons {
            margin: 20px 0;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #45a049;
        }
        button.decode {
            background: #008cba;
        }
        button.decode:hover {
            background: #007bc4;
        }
        .result-box {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Тайный шифратор Base64 🐱</h1>
    <p>Введи текст для кодирования или Base64-строку для расшифровки:</p>

    <textarea id="inputData" placeholder="Пиши сюда..."></textarea>

    <div class="buttons">
        <button onclick="encodeText()">Закодировать</button>
        <button class="decode" onclick="decodeText()">Декодировать</button>
    </div>

    <div class="result-box">
        <h3>Результат:</h3>
        <textarea id="outputData" readonly placeholder="Тут появится результат..."></textarea>
    </div>
</div>

<script>
    function encodeText() {
        const input = document.getElementById('inputData').value;
        try {
            const code = btoa(unescape(encodeURIComponent(input)));
            document.getElementById('outputData').value = code;
        } catch (e) {
            document.getElementById('outputData').value = "Ошибка при кодировании!";
        }
    }

    function decodeText() {
        const input = document.getElementById('inputData').value.trim();
        try {
            const text = decodeURIComponent(escape(atob(input)));
            document.getElementById('outputData').value = text;
        } catch (e) {
            document.getElementById('outputData').value = "Ошибка: Невалидная строка Base64!";
        }
    }
</script>

</body>
</html>
