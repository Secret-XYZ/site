<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            background: #02040a;
            font-family: 'Inter', sans-serif;
        }

        /* Абстрактный синий переливающийся фон */
        body {
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 40px 16px 140px 16px;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background:
                radial-gradient(circle at 20% 35%, rgba(0, 102, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 70, 200, 0.15) 0%, transparent 55%);
            filter: blur(120px);
            z-index: 0;
            animation: liquidBg 16s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes liquidBg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(4%, 2%) scale(1.05); }
        }

        /* Основной контейнер */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            background: rgba(10, 15, 30, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 14px;
            color: #8c9ba5;
            margin-top: 6px;
        }

        .proxy-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Стиль жидкого стекла для карточек */
        .proxy-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .proxy-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(0, 102, 255, 0.2);
        }

        .proxy-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .flag-tag {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .address {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            color: #ffffff;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        /* КНОПКИ СО СКРУГЛЕНИЕМ И LIQUID FILL АНИМАЦИЕЙ */
        .btn {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            background: rgba(255, 255, 255, 0.02);
            color: #d1d5db;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 12px; /* Мягкое красивое скругление кнопок */
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
            transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Эффект затекания жидкости внутри кнопки */
        .btn::before {
            content: '';
            position: absolute;
            top: 100%;
            left: -10%;
            width: 120%;
            height: 180%;
            background: linear-gradient(0deg, #0052d4 0%, #4364f7 50%, #6fb1fc 100%);
            border-radius: 40% 40% 0 0; /* Волна жидкости */
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
            transform: translateX(0) translateY(0);
        }

        .btn:hover {
            color: #ffffff;
            border-color: #4364f7;
            box-shadow: 0 0 15px rgba(67, 100, 247, 0.4);
        }

        .btn:hover::before {
            transform: translateY(-115%) rotate(5deg);
        }

        /* Персонализация кнопки Запуск */
        .btn-connect {
            border-color: rgba(0, 149, 255, 0.2);
            color: #0095ff;
        }

        .btn-copy.copied {
            color: #ffffff;
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .btn-copy.copied::before {
            background: #10b981;
            transform: translateY(-115%);
        }

        /* ПОДВИЖНОЕ СКРУГЛЕННОЕ НИЖНЕЕ МЕНЮ (МАРКЕТ СТИЛЬ) */
        .bottom-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 32px);
            max-width: 360px;
            background: rgba(10, 16, 32, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 6px;
            display: flex;
            gap: 4px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        }

        .bar-btn {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 500;
            color: #8e9aa8;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .bar-btn:hover {
            color: #ffffff;
        }

        .bar-btn.active {
            color: #0095ff;
            background: rgba(0, 149, 255, 0.08);
            border: 1px solid rgba(0, 149, 255, 0.15);
            font-weight: 600;
        }

        /* Мобильная адаптация */
        @media (max-width: 500px) {
            body { padding-top: 20px; }
            .wrapper { padding: 20px 12px; }
            header h1 { font-size: 26px; }

            .proxy-card {
                flex-direction: column;
                align-items: stretch;
                padding: 14px;
                gap: 14px;
            }
            .proxy-info {
                width: 100%;
                justify-content: space-between;
            }
            .actions {
                width: 100%;
            }
            .btn {
                flex: 1;
                padding: 12px 0;
            }
        }
    </style>
</head>

<script>
    function copyProxy(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = button.innerText;
            button.innerText = 'Скопировано';
            button.classList.add('copied');

            setTimeout(() => {
                button.innerText = originalText;
                button.classList.remove('copied');
            }, 1200);
        }).catch(err => {
            console.error('Ошибка буфера: ', err);
        });
    }

    function changeTab(tabId, btnElement) {
        document.querySelectorAll('.bar-btn').forEach(el => el.classList.remove('active'));
        btnElement.classList.add('active');
    }
</script>
